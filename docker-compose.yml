version: "3.9"

services:
  
  api:
    build: .
    container_name: alphahegde_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models   # mount models so you can update without rebuild
      - ./results:/app/results
    environment:
      - MODEL_PATH=models/ppo_hedging_agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build: .
    container_name: alphahegde_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./results:/app/results
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped